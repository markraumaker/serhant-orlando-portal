<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | SERHANT. ORLANDO</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:#06061a;}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

    .card{
      width:100%;max-width:380px;
      display:flex;flex-direction:column;align-items:center;
      text-align:center;
    }
    .logo{height:28px;margin-bottom:40px;}
    .title{font-size:24px;font-weight:900;color:white;margin-bottom:10px;}
    .sub{font-size:13px;color:rgba(255,255,255,0.35);line-height:1.6;margin-bottom:40px;}

    .ms-btn{
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:18px 24px;
      background:white;border:none;border-radius:100px;
      font-size:15px;font-weight:700;color:#1a1a2e;
      font-family:'Montserrat',sans-serif;
      cursor:pointer;transition:all 0.25s ease;
      box-shadow:0 2px 12px rgba(0,0,0,0.15);
    }
    .ms-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 4px 24px rgba(0,0,0,0.3);
    }
    .ms-btn:active{transform:translateY(0);}
    .ms-btn svg{width:20px;height:20px;flex-shrink:0;}

    .err{
      font-size:12px;color:#f87171;margin-top:16px;
      display:none;text-align:center;
      background:rgba(248,113,113,0.08);
      border:1px solid rgba(248,113,113,0.2);
      border-radius:10px;padding:12px 16px;
      width:100%;
    }

    .loading-box{display:none;flex-direction:column;align-items:center;gap:14px;width:100%;}
    .loading-box.active{display:flex;}
    .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:#6868ee;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-txt{font-size:13px;color:rgba(255,255,255,0.4);font-weight:600;}
  </style>
</head>
<body>
<div class="card">
  <img src="assets/logos/SERHANT-Orlando-White.svg" alt="SERHANT. Orlando" class="logo">
  <div class="title">Agent Portal</div>
  <div class="sub">Sign in with your SERHANT. Microsoft account.</div>

  <div id="login-view" style="width:100%;">
    <button class="ms-btn" id="ms-btn" onclick="loginWithMicrosoft()">
      <svg viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </button>
    <div class="err" id="err-msg"></div>
  </div>

  <div class="loading-box" id="loading-view">
    <div class="spinner"></div>
    <div class="loading-txt">Signing you in...</div>
  </div>
</div>

<script>
const HUB_API = 'https://app.serhantorlandohub.com';

function loginWithMicrosoft() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('loading-view').classList.add('active');
  document.getElementById('err-msg').style.display = 'none';

  // Redirect directly to the Hub's Microsoft OAuth endpoint
  // After auth, Hub redirects back to portal with token
  window.location.href = HUB_API + '/api/auth/microsoft-connect?redirect=' + encodeURIComponent(window.location.origin + '/login.html');
}

// Handle callback from Microsoft OAuth
function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  
  // Check if this is a callback with token
  if (params.get('ms_callback') === '1' || params.get('connected') === 'true' || params.get('token')) {
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('loading-view').classList.add('active');
    
    const token = params.get('token');
    const email = params.get('email');
    const name = params.get('name');
    
    if (token || params.get('connected') === 'true') {
      if (token) localStorage.setItem('portal_auth_token', token);
      if (email) localStorage.setItem('portal_user_email', email);
      if (name) localStorage.setItem('portal_user_name', name);
      
      window.history.replaceState(null, '', window.location.pathname);
      const dest = sessionStorage.getItem('portal_redirect') || 'index.html';
      sessionStorage.removeItem('portal_redirect');
      window.location.replace(dest);
      return true;
    }
  }
  
  // Check if there's an error
  if (params.get('error')) {
    const err = document.getElementById('err-msg');
    err.textContent = params.get('error_description') || 'Sign-in failed. Please try again.';
    err.style.display = 'block';
    window.history.replaceState(null, '', window.location.pathname);
    return false;
  }
  
  return false;
}

function init() {
  // Handle OAuth callback first
  if (handleCallback()) return;
  
  // Check if already authenticated
  const msToken = localStorage.getItem('portal_auth_token');
  if (msToken) {
    const dest = sessionStorage.getItem('portal_redirect') || 'index.html';
    sessionStorage.removeItem('portal_redirect');
    window.location.replace(dest);
    return;
  }
  
  // Show login
  document.getElementById('login-view').style.display = '';
}

init();
</script>
</body>
</html>
