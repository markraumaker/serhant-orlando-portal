<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | SERHANT. ORLANDO</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:#06061a;}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;}
    .card{width:340px;display:flex;flex-direction:column;align-items:center;text-align:center;}
    .logo{height:30px;margin-bottom:36px;}
    .title{font-size:22px;font-weight:900;color:white;margin-bottom:8px;}
    .sub{font-size:13px;color:rgba(255,255,255,0.4);line-height:1.6;margin-bottom:28px;}
    .ms-btn{
      width:100%;display:flex;align-items:center;justify-content:center;gap:12px;
      background:#121275;border:1px solid rgba(255,255,255,0.1);border-radius:10px;
      padding:14px 20px;font-size:14px;font-weight:700;color:white;
      cursor:pointer;font-family:'Montserrat',sans-serif;transition:background .2s;
    }
    .ms-btn:hover:not(:disabled){background:#1a1a9a;}
    .ms-btn:disabled{opacity:0.6;cursor:default;}
    .err{font-size:12px;color:#f87171;margin-top:12px;display:none;}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.2);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
    @keyframes spin{to{transform:rotate(360deg);}}
  </style>
</head>
<body>
<div class="card">
  <img src="assets/logos/SERHANT-Orlando-White.svg" alt="SERHANT. Orlando" class="logo">
  <div class="title">Agent Portal</div>
  <div class="sub">Sign in with your @serhant.com<br>Microsoft account.</div>

  <button class="ms-btn" id="ms-btn">
    <svg width="18" height="18" viewBox="0 0 21 21" fill="none">
      <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
      <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
      <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
      <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
    </svg>
    <span id="btn-text">Sign in with Microsoft</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="err" id="err">Something went wrong. Try again.</div>
</div>

<script>
  const SB_URL = 'https://lqothpzxhxvhvyikmphx.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxxb3RocHp4aHh2aHZ5aWttcGh4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5ODkzNjgsImV4cCI6MjA5MDU2NTM2OH0.zDE-lniLRF3TdYZmMMSQL20vF_H74_qiMlJM2tX_nKo';
  const sb = supabase.createClient(SB_URL, SB_KEY);

  async function init() {
    // Handle OAuth callback (token in URL hash)
    if (window.location.hash.includes('access_token') || window.location.search.includes('code=')) {
      const { data: { session } } = await sb.auth.getSession();
      if (session) {
        window.history.replaceState(null, '', window.location.pathname);
        const dest = sessionStorage.getItem('portal_redirect') || 'index.html';
        sessionStorage.removeItem('portal_redirect');
        window.location.replace(dest);
        return;
      }
    }
    // Already logged in
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const dest = sessionStorage.getItem('portal_redirect') || 'index.html';
      sessionStorage.removeItem('portal_redirect');
      window.location.replace(dest);
    }
  }

  document.getElementById('ms-btn').addEventListener('click', async () => {
    const btn = document.getElementById('ms-btn');
    document.getElementById('btn-text').textContent = 'Redirecting...';
    document.getElementById('spinner').style.display = 'block';
    btn.disabled = true;

    const { error } = await sb.auth.signInWithOAuth({
      provider: 'azure',
      options: {
        scopes: 'email profile',
        redirectTo: window.location.origin + '/login.html'
      }
    });

    if (error) {
      document.getElementById('btn-text').textContent = 'Sign in with Microsoft';
      document.getElementById('spinner').style.display = 'none';
      btn.disabled = false;
      document.getElementById('err').style.display = 'block';
    }
  });

  init();
</script>
</body>
</html>
