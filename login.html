<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | SERHANT. ORLANDO</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;font-family:'Montserrat',sans-serif;background:#06061a;}
    body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}

    .card{
      width:100%;max-width:380px;
      display:flex;flex-direction:column;align-items:center;
      text-align:center;
    }
    .logo{height:28px;margin-bottom:40px;}
    .title{font-size:24px;font-weight:900;color:white;margin-bottom:10px;}
    .sub{font-size:13px;color:rgba(255,255,255,0.35);line-height:1.6;margin-bottom:40px;}

    .ms-btn{
      display:flex;align-items:center;justify-content:center;gap:12px;
      width:100%;padding:18px 24px;
      background:white;border:none;border-radius:100px;
      font-size:15px;font-weight:700;color:#1a1a2e;
      font-family:'Montserrat',sans-serif;
      cursor:pointer;transition:all 0.25s ease;
      box-shadow:0 2px 12px rgba(0,0,0,0.15);
    }
    .ms-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 4px 24px rgba(0,0,0,0.3);
    }
    .ms-btn:active{transform:translateY(0);}
    .ms-btn svg{width:20px;height:20px;flex-shrink:0;}

    .err{
      font-size:12px;color:#f87171;margin-top:16px;
      display:none;text-align:center;
      background:rgba(248,113,113,0.08);
      border:1px solid rgba(248,113,113,0.2);
      border-radius:10px;padding:12px 16px;
      width:100%;
    }

    .loading-box{display:none;flex-direction:column;align-items:center;gap:14px;width:100%;}
    .loading-box.active{display:flex;}
    .spinner{width:28px;height:28px;border:3px solid rgba(255,255,255,0.1);border-top-color:#6868ee;border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .loading-txt{font-size:13px;color:rgba(255,255,255,0.4);font-weight:600;}
  </style>
</head>
<body>
<div class="card">
  <img src="assets/logos/SERHANT-Orlando-White.svg" alt="SERHANT. Orlando" class="logo">
  <div class="title">Agent Portal</div>
  <div class="sub">Sign in with your SERHANT. Microsoft account.</div>

  <div id="login-view" style="width:100%;">
    <button class="ms-btn" id="ms-btn" onclick="loginWithMicrosoft()">
      <svg viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Sign in with Microsoft
    </button>
    <div class="err" id="err-msg"></div>
  </div>

  <div class="loading-box" id="loading-view">
    <div class="spinner"></div>
    <div class="loading-txt">Signing you in...</div>
  </div>
</div>

<script>
// Azure AD config -- same app registration as the Hub
const CLIENT_ID = 'f2995b88-7c96-492a-8956-70dcf9b0e70c';
const TENANT_ID = '78533c6a-7050-42e0-81e7-c21fcab6bf16';
const REDIRECT_URI = window.location.origin + '/login.html';
const SCOPES = 'openid profile email User.Read';

function loginWithMicrosoft() {
  document.getElementById('login-view').style.display = 'none';
  document.getElementById('loading-view').classList.add('active');
  document.getElementById('err-msg').style.display = 'none';

  // Build Microsoft OAuth URL directly -- no Hub backend needed
  // Only requesting identity scopes (User.Read) -- already admin-consented
  var params = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'id_token',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    response_mode: 'fragment',
    prompt: 'select_account',
    nonce: Math.random().toString(36).substring(2)
  });

  window.location.href = 'https://login.microsoftonline.com/' + TENANT_ID + '/oauth2/v2.0/authorize?' + params.toString();
}

// Handle the callback -- Microsoft returns id_token in URL fragment
function handleCallback() {
  // Check fragment (implicit flow returns tokens in hash)
  var hash = window.location.hash.substring(1);
  if (!hash) return false;

  var params = new URLSearchParams(hash);
  var idToken = params.get('id_token');
  var error = params.get('error');

  if (error) {
    var desc = params.get('error_description') || 'Sign-in failed. Please try again.';
    showError(desc);
    window.history.replaceState(null, '', window.location.pathname);
    return true;
  }

  if (!idToken) return false;

  // Decode the JWT payload (no verification needed -- Microsoft signed it)
  try {
    var payload = JSON.parse(atob(idToken.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    var email = (payload.preferred_username || payload.email || payload.upn || '').toLowerCase();
    var name = payload.name || payload.given_name || email.split('@')[0];

    if (!email || !email.endsWith('@serhant.com')) {
      showError('Access restricted to SERHANT. accounts.');
      window.history.replaceState(null, '', window.location.pathname);
      return true;
    }

    // Store auth data
    localStorage.setItem('portal_auth_token', idToken);
    localStorage.setItem('portal_user_email', email);
    localStorage.setItem('portal_user_name', name);

    // Show loading state
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('loading-view').classList.add('active');

    // Clean URL and redirect
    window.history.replaceState(null, '', window.location.pathname);
    var dest = sessionStorage.getItem('portal_redirect') || 'index.html';
    sessionStorage.removeItem('portal_redirect');
    window.location.replace(dest);
    return true;

  } catch (e) {
    showError('Could not verify your identity. Please try again.');
    window.history.replaceState(null, '', window.location.pathname);
    return true;
  }
}

// Also handle query param callback (legacy Hub redirect flow)
function handleQueryCallback() {
  var params = new URLSearchParams(window.location.search);
  if (params.get('connected') === 'true' || params.get('token')) {
    var token = params.get('token');
    var email = params.get('email');
    var name = params.get('name');

    if (token) localStorage.setItem('portal_auth_token', token);
    if (email) localStorage.setItem('portal_user_email', email);
    if (name) localStorage.setItem('portal_user_name', name);

    document.getElementById('login-view').style.display = 'none';
    document.getElementById('loading-view').classList.add('active');

    window.history.replaceState(null, '', window.location.pathname);
    var dest = sessionStorage.getItem('portal_redirect') || 'index.html';
    sessionStorage.removeItem('portal_redirect');
    window.location.replace(dest);
    return true;
  }

  if (params.get('error')) {
    showError(params.get('error_description') || 'Sign-in failed. Please try again.');
    window.history.replaceState(null, '', window.location.pathname);
    return true;
  }

  return false;
}

function showError(msg) {
  var err = document.getElementById('err-msg');
  err.textContent = msg;
  err.style.display = 'block';
  document.getElementById('login-view').style.display = '';
  document.getElementById('loading-view').classList.remove('active');
}

function init() {
  // Handle OAuth callback (fragment for direct flow, query for Hub flow)
  if (handleCallback()) return;
  if (handleQueryCallback()) return;

  // Check if already authenticated
  var token = localStorage.getItem('portal_auth_token');
  if (token) {
    var dest = sessionStorage.getItem('portal_redirect') || 'index.html';
    sessionStorage.removeItem('portal_redirect');
    window.location.replace(dest);
    return;
  }

  // Show login
  document.getElementById('login-view').style.display = '';
}

init();
</script>
</body>
</html>
